<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Build with Griffin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-brand">
      <img src="gm-profile.png" alt="GM" class="header-logo">
      <h1>Build with Griffin</h1>
    </div>
    <nav id="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#projects">Projects</a>
      <a href="why-me.html">Why Me</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button id="nav-toggle" aria-label="Toggle navigation menu">☰</button>
  </header>

  <main>
    <section class="contact-page">
      <p class="eyebrow">Let's work together</p>
      <h2>Get in touch</h2>
      <p class="hero-sub">Want a site like these for your business? Reach out — happy to talk through what you need.</p>

      <form id="contact-form" action="https://formspree.io/f/xojolong" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">What are you looking for?</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Build with Griffin</p>
  </footer>

  <script src="js/nav-toggle.js"></script>
</body>
</html>
